<!doctype html>
<html><head><meta charset="utf-8"><title>FZ Single</title>
<style>
  html,body{margin:0;padding:0;background:#0B0F0D;font-family:system-ui;}
  #stage{width:360px;height:760px;overflow:hidden;}
  #stage.light{background:#F6F5F1;}
  #stage.dark{background:#0B0F0D;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>@import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap');</style>
</head>
<body>
<div id="stage" class="dark"></div>
<script type="text/babel" src="fz-logo.jsx"></script>
<script type="text/babel" src="screens-a.jsx"></script>
<script type="text/babel" src="screens-a-light.jsx"></script>
<script type="text/babel" src="screens-a-cards.jsx"></script>
<script type="text/babel" src="screens-a-config.jsx"></script>
<script type="text/babel">
const SCREENS = {
  '01-login':       { theme: 'dark',  comp: <ALogin/> },
  '02-mes':         { theme: 'dark',  comp: <AHome/> },
  '03-expandido':   { theme: 'dark',  comp: <AHomeExpanded/> },
  '04-tarjetas':    { theme: 'dark',  comp: <ACardsList/> },
  '05-detalle':     { theme: 'dark',  comp: <ACardDetail/> },
  '06-nueva-compra':{ theme: 'dark',  comp: <ANewPurchase/> },
  '07-editar-tarjeta':{theme:'dark',  comp: <AEditCard/> },
  '08-config':      { theme: 'dark',  comp: <AConfig/> },
  '09-cuentas-fijas':{theme: 'dark',  comp: <AFixedAccounts/> },
  '10-nueva-cuenta':{ theme: 'dark',  comp: <ANewFixedAccount/> },
  '11-editar-cuenta':{theme: 'dark',  comp: <AEditFixedAccount/> },
  '12-login-claro': { theme: 'light', comp: <ALLogin/> },
  '13-mes-claro':   { theme: 'light', comp: <ALHome/> },
  '14-expandido-claro':{theme:'light',comp: <ALHomeExpanded/> },
};
const params = new URLSearchParams(location.search);
const id = params.get('s') || '01-login';
const cfg = SCREENS[id];
const stage = document.getElementById('stage');
stage.className = cfg.theme;
ReactDOM.createRoot(stage).render(cfg.comp);
window.__ready = true;
</script>
</body></html>
