name: Release iOS (App Store / TestFlight)

# Build IPA firmado y sube a App Store Connect (TestFlight automático).
# Requiere macOS runner (Apple no permite cross-compile).
#
# Secrets requeridos:
#   APPLE_ID_TEAM_ID                 - tu Team ID (developer.apple.com → Membership)
#   APPLE_ID_CERTIFICATE_BASE64      - .p12 del cert de distribution en base64
#   APPLE_ID_CERTIFICATE_PASSWORD    - password del .p12
#   APPLE_ID_PROVISIONING_PROFILE_BASE64  - .mobileprovision del app en base64
#                                       (REGENERADO con la capability App Groups)
#   APPLE_ID_WIDGET_PROVISIONING_PROFILE_BASE64 - .mobileprovision de la
#                                       extensión FinanzappWidget en base64
#                                       (App ID app.finanzapp.client.FinanzappWidget)
#   APP_STORE_CONNECT_API_KEY_ID     - generado en App Store Connect → Users and Access → Keys
#   APP_STORE_CONNECT_API_ISSUER_ID  - mismo lugar
#   APP_STORE_CONNECT_API_KEY_BASE64 - el .p8 en base64
#   KEYCHAIN_PASSWORD                - password temporal random para el keychain del runner
#                                       (cualquier string fuerte, ej `openssl rand -base64 32`)
#
# Cómo obtener los certs:
#   1. En Xcode: Settings → Accounts → tu Apple ID → Manage Certificates →
#      crear "Apple Distribution" (export como .p12 con password).
#   2. En developer.apple.com → Profiles → crear App Store provisioning
#      profile para com.xavier.finanzapp (download .mobileprovision).
#
# Disparadores: igual que Android (manual + tag v*.*.*).

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

env:
  FLUTTER_VERSION: "3.35.7"

jobs:
  build-and-upload:
    name: Build IPA + upload to TestFlight
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup signing keychain
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_ID_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_ID_PROVISIONING_PROFILE_BASE64 }}
          WIDGET_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_ID_WIDGET_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode cert and profiles (app + widget extension)
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          WIDGET_PROFILE_PATH=$RUNNER_TEMP/widget_profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$CERTIFICATE_BASE64" | base64 -d > $CERT_PATH
          echo "$PROVISIONING_PROFILE_BASE64" | base64 -d > $PROFILE_PATH
          echo "$WIDGET_PROVISIONING_PROFILE_BASE64" | base64 -d > $WIDGET_PROFILE_PATH

          # Create temp keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import cert
          security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install both provisioning profiles. Xcode los busca por UUID en
          # esta carpeta; el nombre de archivo no importa mientras estén ahí.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision
          cp $WIDGET_PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/widget.mobileprovision

      - run: flutter pub get

      # El proyecto tiene un build phase (de `flutterfire configure`) que sube
      # símbolos de Crashlytics llamando al CLI `flutterfire`. Sin él, el build
      # de Xcode falla con "flutterfire: command not found".
      - name: Install FlutterFire CLI
        run: |
          dart pub global activate flutterfire_cli
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - run: cd ios && pod install && cd ..

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload to App Store Connect via altool
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          # altool busca la API key en ~/.appstoreconnect/private_keys/
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY_BASE64" | base64 -d > \
            ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file build/ios/ipa/*.ipa \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID"

      - name: Upload IPA as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Cleanup keychain (best effort)
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
