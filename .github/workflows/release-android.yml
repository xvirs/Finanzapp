name: Release Android (Play Store)

# Build AAB firmado y sube a Play Store Internal Testing.
# Requiere los siguientes secrets configurados en
# Settings → Secrets and variables → Actions:
#
#   PLAY_KEYSTORE_BASE64       - el .jks codificado en base64
#                                  (mac: `base64 -i finanzapp-release.jks | pbcopy`)
#   PLAY_KEYSTORE_PASSWORD     - storePassword
#   PLAY_KEY_PASSWORD          - keyPassword
#   PLAY_KEY_ALIAS             - "finanzapp"
#   PLAY_SERVICE_ACCOUNT_JSON  - JSON del service account de Google Play
#                                Console (creado en Play Console →
#                                Setup → API access → Generate)
#   SUPABASE_URL               - opcional, si querés override por env
#   SUPABASE_ANON_KEY          - opcional, idem
#
# Disparadores:
#   - Manual (workflow_dispatch) — el botón "Run workflow" en la UI.
#   - Push de un tag v*.*.* — release version-bumped.

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
  push:
    tags:
      - 'v*.*.*'

env:
  FLUTTER_VERSION: "3.35.7"
  JAVA_VERSION: "17"

jobs:
  build-and-upload:
    name: Build AAB + upload to Play Store
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.PLAY_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/release.jks
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> $GITHUB_ENV

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.PLAY_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.PLAY_KEY_PASSWORD }}
          keyAlias=${{ secrets.PLAY_KEY_ALIAS }}
          storeFile=${{ env.KEYSTORE_PATH }}
          EOF

      - run: flutter pub get
      - run: flutter build appbundle --release

      - name: Verify signed AAB
        run: jarsigner -verify build/app/outputs/bundle/release/app-release.aab

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.finanzapp.client
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          # Acceso a producción ya habilitado por Google (14 testers/14 días
          # cumplidos). Tag push → production. El dispatch manual puede elegir
          # 'alpha'/'internal' para probar sin tocar producción.
          track: ${{ github.event.inputs.track || 'production' }}
          status: completed

      - name: Upload AAB as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
