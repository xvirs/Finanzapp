name: finanzapp
description: "Control de gastos recurrentes obligatorios — versión nativa de FinanzasXavier"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend / auth
  supabase_flutter: ^2.8.0

  # State management
  flutter_bloc: ^8.1.6
  hydrated_bloc: ^9.1.5
  equatable: ^2.0.5

  # Routing
  go_router: ^14.6.2

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Auth providers
  google_sign_in: ^6.2.2

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.19.0

  # Local storage (for hydrated_bloc)
  path_provider: ^2.1.5

  # Local notifications (recordatorios pre-vencimiento)
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^4.0.0

  # Biometric lock (Face ID / huella)
  local_auth: ^2.3.0
  shared_preferences: ^2.3.5

  # Design system: fuentes Geist + GeistMono (CDN runtime via google_fonts)
  google_fonts: ^6.2.1
  # SVG (logo Google y otros iconos vectoriales del design)
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # App icon (Android + iOS) generado desde assets/icons/app_icon.png
  flutter_launcher_icons: ^0.14.2
  # Splash screen
  flutter_native_splash: ^2.4.3

# Genera iconos nativos para Android + iOS:
#   flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#1FB87A"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21

# Genera splash screen para Android + iOS:
#   flutter pub run flutter_native_splash:create
flutter_native_splash:
  color: "#0B0F0D"
  image: "assets/icons/app_icon.png"
  android_12:
    color: "#0B0F0D"
    image: "assets/icons/app_icon.png"
    icon_background_color: "#0B0F0D"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
